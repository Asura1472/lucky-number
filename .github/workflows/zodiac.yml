name: Generate Daily Zodiac Numbers

on:
  schedule:
    - cron: '29 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate JSON
        run: python generate_zodiac.py

      - name: Show generated file
        run: cat today_zodiac.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add today_zodiac.json
          git diff --cached --quiet && exit 0
          git commit -m "Update today zodiac json"
          git push
